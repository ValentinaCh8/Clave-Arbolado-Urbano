<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Clave dicotómica</title>

<style>
body{
  margin:0;
  font-family:system-ui,Segoe UI,Arial;
  display:flex;
  height:100vh;
  background:#f5f7fb;
}

#left{
  width:420px;
  padding:16px;
}

.card{
  background:#fff;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  cursor:pointer;
}

#canvas{
  flex:1;
  background:#dfeeff;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>

<div id="left">

  <div>Dilema: <strong id="dilemaId"></strong></div>

  <div class="card" id="optA">
    <h3>A</h3>
    <p id="optA_text"></p>
  </div>

  <div class="card" id="optB">
    <h3>B</h3>
    <p id="optB_text"></p>
  </div>

  <button onclick="location.reload()">Reiniciar</button>

</div>

<div id="canvas"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.0/build/three.min.js"></script>

<script>

/* =========================
   IMÁGENES (MAPA MANUAL)
========================= */

const imageMap = {
  "1":"Recurso 1.jpg",
  "2a":"Recurso 2.jpg",
  "3a":"Recurso 3.jpg",
  "4a":"Recurso 4.jpg",
  "5a_pinnadas":"Recurso 6.jpg",
  "6a_pinnadas":"Recurso 8.jpg",
  "4b": "Recurso 7.jpg"
  "5a_palmadas": "Recurso 9.jpg",
  "6a_palmadas": "Recurso 10.jpg",
  "7a": "Recurso 11.jpg",
};

/* =========================
   NODOS (EJEMPLO BASE)
========================= */

const nodes = {
  "1": {
    a: { text: "Plantas con un eje único desde la base. Árboles", goto: "2a" },
    b: { text: "Arbustos", result: "Arbustos" }
  },

  "2a": {
    a: { text: "Plantas con un eje sin ramificaciones laterales. Hojas agrupadas en el extremo superior", goto: "3a" },
    b: { text: "Plantas con ramas a lo largo. Hojas distribuidas en ramas laterales y terminales", goto: "3b" }
  },

  "3a": {
    a: { text: "Hojas pinnadas", goto: "4a" },
    b: { text: "Hojas palmadas", goto: "4b" }
  },

  "4a": {
    a: { text: "Hojas con pecíolo no espinoso", result: "Syagrus romanzoffiana (Palmera Pindó)" },
    b: { text: "Hojas con pecíolo espinoso", goto: "5a_pinnadas" }
  },

  "5a_pinnadas": {
    a: { text: "Espinas ganchosas", result: "Butia yatay (Palmera Yatay)" },
    b: { text: "Espinas no ganchosas", goto: "6a_pinnadas" }
  },

  "6a_pinnadas": {
    a: { text: "Estípite robusto. Hojas de 5 a 7m", result: "Phoenix canariensis (Palmera Fénix)" },
    b: { text: "Estípite fino. Hojas de 1,5m", result: "Phoenix roebelenii (Palmera Fénix robelini)" }
  },

  "4b": {
    a: { text: "Plantas con un solo estípite", goto: "5a_palmadas" },
    b: { text: "Plantas con varios estípites desde la base", result: "Chamaerops humilis (Palmito)" }
  },

  "5a_palmadas": {
    a: { text: "Estípite con restos foliares", goto: "6a_palmadas" },
    b: { text: "Estípite sin restos foliares", result: "Livistona chinensis (Palmera de abanico china)" }
  },

  "6a_palmadas": {
    a: { text: "Estípite con restos foliares no peludos", goto: "7a" },
    b: { text: "Estípite con fibras oscuras y aspecto peludo", result: "Trachycarpus fortunei (Palmera china de abanico)" }
  },

  "7a": {
    a: { text: "Estípite fino y hojas sin filamentos", result: "Washingtonia robusta (Palmera de abanico)" },
    b: { text: "Estípite robusto y hojas hilachosas", result: "Washingtonia filifera (Washingtonia de California)" }
  },

  "3b": {
    a: { text: "Árboles sin hojas verdaderas, con acículas fotosintetizantes", result: "Washingtonia robusta" },
    b: { text: "Escamas en verticilos sobre ramitas verdes", result: "Washingtonia filifera" }
  }
};

/* =========================
   THREE JS
========================= */

let scene, camera, renderer, mesh;

function init3D(){
  const c = document.getElementById("canvas");

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(45,1,0.1,1000);
  camera.position.z = 3;

  renderer = new THREE.WebGLRenderer();
  renderer.setSize(400,400);
  c.appendChild(renderer.domElement);

  const geo = new THREE.PlaneGeometry(2,2);
  const mat = new THREE.MeshBasicMaterial({color:0xffffff});
  mesh = new THREE.Mesh(geo,mat);

  scene.add(mesh);

  animate();
}

function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}

/* =========================
   IMAGEN
========================= */

function loadImage(key){

  const img = imageMap[key];

  if(!img){
    console.warn("Sin imagen:", key);
    return;
  }

  const url = "./dilemasjpg/Recurso " + img + ".jpg";

  const loader = new THREE.TextureLoader();

  loader.load(url, tex=>{
    mesh.material.map = tex;
    mesh.material.needsUpdate = true;
  });
}

/* =========================
   UI
========================= */

function render(id){

  const node = nodes[id];
  if(!node) return;

  document.getElementById("dilemaId").textContent = id;

  document.getElementById("optA_text").textContent = node.a.text;
  document.getElementById("optB_text").textContent = node.b.text;

  document.getElementById("optA").onclick = ()=>go(node.a);
  document.getElementById("optB").onclick = ()=>go(node.b);

  loadImage(id);
}

function go(opt){
  if(opt.result){
    document.getElementById("dilemaId").textContent = "Resultado";
    document.getElementById("optA_text").textContent = opt.text + " → " + opt.result;
    document.getElementById("optB").style.display = "none";
    return;
  }

  document.getElementById("optB").style.display = "block";
  render(opt.goto);
}

/* =========================
   INICIO
========================= */

init3D();
render("1");

</script>

</body>
</html>

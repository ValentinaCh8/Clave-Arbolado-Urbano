<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Clave árbol urbano - Dilemas</title>
<style>
  :root{--bg:#f5f7fb;--card:#fff;--accent:#2b7cff;--muted:#6b7280}
  body{margin:0;font-family:system-ui,Segoe UI,Arial;background:var(--bg);color:#111;display:flex;flex-direction:column;height:100vh}
  header{padding:16px 20px;background:linear-gradient(90deg,#fff 0,#f0f6ff 100%);box-shadow:0 1px 0 rgba(0,0,0,0.05)}
  header h1{margin:0;font-size:20px}
  main{display:flex;flex:1;gap:18px;padding:18px;box-sizing:border-box}
  #left{flex:0 0 420px;display:flex;flex-direction:column;gap:12px}
  .meta{font-size:13px;color:var(--muted)}
  .card{background:var(--card);border-radius:10px;padding:12px;box-shadow:0 6px 20px rgba(19,27,38,0.06);position:relative;cursor:pointer;min-height:84px;display:flex;gap:12px;align-items:flex-start}
  .card .thumb{width:92px;height:64px;border-radius:6px;background:#f6f9ff center/cover no-repeat;border:1px solid rgba(0,0,0,0.06);flex:0 0 92px}
  .card .ct{flex:1}
  .card h3{margin:0 0 6px 0;font-size:14px}
  .card p{margin:0;color:var(--muted);font-size:13px}
  .card.hidden{display:none}
  #controls{display:flex;gap:8px;align-items:center;margin-top:8px}
  button{background:var(--accent);color:#fff;border:0;padding:8px 12px;border-radius:8px;cursor:pointer}
  button.secondary{background:#e6eefc;color:var(--accent)}
  #canvas-container{flex:1;background:linear-gradient(180deg,#e9f0ff 0,#ffffff 100%);border-radius:12px;padding:12px;display:flex;align-items:center;justify-content:center;position:relative;min-height:320px;overflow:hidden}
  #mainRecurso{position:absolute;left:16px;top:16px;background:rgba(255,255,255,0.9);padding:8px 10px;border-radius:8px;box-shadow:0 6px 18px rgba(16,24,40,0.06)}
  footer{font-size:12px;color:var(--muted);padding:8px 18px;text-align:right}
  @media(max-width:880px){main{flex-direction:column}#left{width:100%}}
</style>
</head>
<body>
<header><h1>Clave por caracteres vegetativos — Dilemas</h1></header>
<main>
  <div id="left">
    <div class="meta">Dilema: <strong id="dilemaId">—</strong></div>

    <div id="optA" class="card" role="button" tabindex="0">
      <div class="thumb" id="thumbA"></div>
      <div class="ct">
        <h3 id="optA_title">Opción A</h3>
        <p id="optA_text">-</p>
      </div>
    </div>

    <div id="optB" class="card" role="button" tabindex="0">
      <div class="thumb" id="thumbB"></div>
      <div class="ct">
        <h3 id="optB_title">Opción B</h3>
        <p id="optB_text">-</p>
      </div>
    </div>

    <div id="controls">
      <button id="restart">Reiniciar</button>
      <button class="secondary" id="mapBtn">Mapa recursos</button>
      <div style="flex:1"></div>
      <div class="meta">Carpeta imágenes: <span id="imgPath"></span></div>
    </div>

  </div>

  <div id="canvas-container">
    <div id="mainRecurso">Recurso: <strong id="recursoLabel">—</strong></div>
  </div>
</main>
<footer>Guarda como .html y sube a GitHub; ajusta imageFolderPath al publicar</footer>

<script src="https://cdn.jsdelivr.net/npm/three@0.156.0/build/three.min.js"></script>
